version: "3.8"

services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  postmanfrontend:
    build: ./frontend
    ports:
      - "3000:3000"
      
  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cruddb
    ports:
      - "3306:3306"          